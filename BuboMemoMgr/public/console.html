<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuboMemoMgr Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --primary: #0f172a;
            --primary-dark: #0f172a;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --text-dim: #64748b;
            --accent: #10b981;
            --danger: #dc2626;
            --success: #059669;
            --warning: #f59e0b;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Roboto Condensed', 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            line-height: 1.5;
            padding: 2rem;
            min-height: 100vh;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 3rem;
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(to right, var(--primary), var(--accent));
            -webkit-background-clip: text;
            background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }

        .stat-card {
            background: var(--card-bg);
            padding: 1.5rem;
            border-radius: 1rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
        }

        .stat-value {
            font-size: 2rem;
            font-weight: 700;
            color: var(--accent);
            margin-bottom: 0.25rem;
        }

        .stat-label {
            color: var(--text-dim);
            font-size: 0.875rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        /* Toolbar & Filters */
        .toolbar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 2rem;
            gap: 1rem;
            flex-wrap: wrap;
        }

        .search-box {
            flex: 1;
            min-width: 300px;
            position: relative;
        }

        .search-box input {
            width: 100%;
            padding: 0.75rem 1rem 0.75rem 2.5rem;
            background: var(--card-bg);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.75rem;
            color: white;
            font-family: 'Roboto Condensed', 'Inter', sans-serif;
        }

        .search-box svg {
            position: absolute;
            left: 0.75rem;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-dim);
        }

        .actions {
            display: flex;
            gap: 0.75rem;
        }

        button {
            padding: 0.6rem 1.2rem;
            border-radius: 0.5rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            border: none;
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-dark);
        }

        .btn-secondary {
            background-color: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .btn-secondary:hover {
            background-color: rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background-color: rgba(239, 68, 68, 0.1);
            color: var(--danger);
            border: 1px solid rgba(239, 68, 68, 0.2);
        }

        .btn-danger:hover {
            background-color: var(--danger);
            color: white;
        }

        /* Card Grid */
        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 1.5rem;
        }

        .memo-card {
            background: var(--card-bg);
            border-radius: 1.25rem;
            padding: 1.5rem;
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex;
            flex-direction: column;
            transition: transform 0.2s, border-color 0.2s;
            position: relative;
            overflow: hidden;
        }

        .memo-card:hover {
            transform: translateY(-4px);
            border-color: var(--primary);
        }

        .memo-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 1rem;
            gap: 1rem;
        }

        .memo-title {
            font-size: 1.1rem;
            font-weight: 600;
            color: var(--text-main);
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .memo-tags {
            display: flex;
            flex-wrap: wrap;
            gap: 0.5rem;
            margin-bottom: 1.25rem;
        }

        .tag-pill {
            background: rgba(99, 102, 241, 0.15);
            color: #a5b4fc;
            padding: 0.2rem 0.6rem;
            border-radius: 2rem;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .memo-footer {
            margin-top: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding-top: 1rem;
            border-top: 1px solid rgba(255, 255, 255, 0.05);
        }

        .memo-meta {
            font-size: 0.75rem;
            color: var(--text-dim);
        }

        .card-actions {
            display: flex;
            gap: 0.5rem;
        }

        .action-icon-btn {
            padding: 0.4rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 0.4rem;
            color: var(--text-dim);
        }

        .action-icon-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        .status-indicator {
            position: absolute;
            top: 0;
            right: 0;
            width: 4px;
            height: 100%;
        }

        .status-cached {
            background: var(--success);
        }

        .status-pending {
            background: var(--warning);
        }

        .status-failed {
            background: var(--danger);
        }

        /* Modal */
        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            justify-content: center;
            align-items: center;
            z-index: 100;
            backdrop-filter: blur(5px);
        }

        .modal-content {
            background: var(--card-bg);
            padding: 2rem;
            border-radius: 1.5rem;
            width: 450px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .form-group {
            margin-bottom: 1.25rem;
        }

        label {
            display: block;
            margin-bottom: 0.5rem;
            color: var(--text-dim);
            font-size: 0.875rem;
        }

        input[type="text"],
        input[type="file"] {
            width: 100%;
            padding: 0.75rem;
            background: rgba(0, 0, 0, 0.2);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 0.5rem;
            color: white;
            font-family: 'Roboto Condensed', 'Inter', sans-serif;
        }

        #drop-zone {
            border: 2px dashed rgba(255, 255, 255, 0.1);
            border-radius: 1rem;
            padding: 2rem;
            text-align: center;
            cursor: pointer;
        }

        .loader {
            width: 1rem;
            height: 1rem;
            border: 2px solid white;
            border-bottom-color: transparent;
            border-radius: 50%;
            display: inline-block;
            animation: rotation 1s linear infinite;
        }

        @keyframes rotation {
            from {
                transform: rotate(0deg);
            }

            to {
                transform: rotate(360deg);
            }
        }
    </style>
</head>

<body>
    <div class="container">
        <header>
            <div>
                <h1>BuboMemoMgr</h1>
                <p style="color: var(--text-dim)">Knowledge-first Google Drive memo manager</p>
            </div>
            <div class="actions">
                <button class="btn-primary" onclick="openUploadModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M17 8l-5-5-5 5M12 3v12" />
                    </svg>
                    New Memo
                </button>
                <button class="btn-secondary" onclick="syncMetadata()" id="sync-btn">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path
                            d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
                    </svg>
                    Sync Card
                </button>
                <button class="btn-danger" onclick="clearCache()">Reset Local</button>
            </div>
        </header>

        <main>
            <div class="stats-grid" id="stats">
                <div class="stat-card">
                    <div class="stat-value" id="val-total">0</div>
                    <div class="stat-label">Total Cards</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="val-cached">0</div>
                    <div class="stat-label">Cached Locally</div>
                </div>
                <div class="stat-card">
                    <div class="stat-value" id="val-size">0 KB</div>
                    <div class="stat-label">Total Size</div>
                </div>
            </div>

            <div class="toolbar">
                <div class="search-box">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="11" cy="11" r="8" />
                        <path d="m21 21-4.3-4.3" />
                    </svg>
                    <input type="text" id="searchInput" placeholder="Search by title or question..."
                        oninput="filterCards()">
                </div>
            </div>

            <div class="card-grid" id="card-container">
                <!-- Cards loaded via JS -->
            </div>
        </main>
    </div>

    <!-- Upload Modal -->
    <div id="uploadModal" class="modal">
        <div class="modal-content">
            <h3 style="margin-bottom: 1.5rem">Create Knowledge Card</h3>
            <div class="form-group">
                <label>Title / Question</label>
                <input type="text" id="upload-title" placeholder="What is Amadeus?">
            </div>
            <div class="form-group">
                <label>Tags (comma separated)</label>
                <input type="text" id="upload-tags" placeholder="travel, business, tech">
            </div>
            <div id="drop-zone" onclick="document.getElementById('fileInput').click()">
                <p style="font-size: 0.9rem; color: var(--text-dim)">Click to select card content (.md or .pdf)</p>
                <input type="file" id="fileInput" hidden>
            </div>
            <div style="margin-top: 2rem; display: flex; gap: 1rem; justify-content: flex-end;">
                <button class="btn-secondary" onclick="closeUploadModal()">Cancel</button>
                <button class="btn-primary" onclick="handleFileUpload()" id="uploadBtn">Create Card</button>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';
        let allMemos = [];

        async function fetchStatus() {
            const res = await fetch(`${API_BASE}/system/status`);
            const data = await res.json();
            document.getElementById('val-total').textContent = data.total_files;
            document.getElementById('val-cached').textContent = data.cached_files;
            document.getElementById('val-size').textContent = formatBytes(data.total_size || 0);
        }

        async function fetchMemos() {
            const res = await fetch(`${API_BASE}/metadata`);
            allMemos = await res.json();
            renderCards(allMemos);
        }

        function renderCards(memos) {
            const container = document.getElementById('card-container');
            container.innerHTML = '';

            memos.forEach(memo => {
                const tags = (memo.memo_tags || '').split(',').filter(t => t.trim() !== '');
                const card = document.createElement('div');
                card.className = 'memo-card';
                card.innerHTML = `
                    <div class="status-indicator status-${memo.cache_status}"></div>
                    <div class="memo-header">
                        <div class="memo-title">${memo.memo_title || memo.name}</div>
                    </div>
                    <div class="memo-tags">
                        ${tags.map(tag => `<span class="tag-pill">${tag.trim()}</span>`).join('')}
                    </div>
                    <div class="memo-footer">
                        <div class="memo-meta">
                            ${formatBytes(memo.size)} • ${new Date(memo.created_at).toLocaleDateString()}
                        </div>
                        <div class="card-actions">
                            <button class="action-icon-btn" onclick="downloadContent('${memo.uuid}')" title="Read Content">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4M7 10l5 5 5-5M12 15V3"/></svg>
                            </button>
                            <button class="action-icon-btn" onclick="deleteMemo('${memo.uuid}')" title="Delete Card">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M3 6h18M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/></svg>
                            </button>
                        </div>
                    </div>
                `;
                container.appendChild(card);
            });
        }

        function filterCards() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allMemos.filter(memo =>
                (memo.memo_title || memo.name).toLowerCase().includes(query) ||
                (memo.memo_tags || '').toLowerCase().includes(query)
            );
            renderCards(filtered);
        }

        function formatBytes(bytes, decimals = 1) {
            if (!+bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(decimals))} ${sizes[i]}`;
        }

        async function syncMetadata() {
            const btn = document.getElementById('sync-btn');
            btn.innerHTML = '<span class="loader"></span> Syncing...';
            await fetch(`${API_BASE}/sync`, { method: 'POST' });
            await refreshData();
            btn.innerHTML = '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"/></svg> Sync Card';
        }

        async function clearCache() {
            if (!confirm('Clear ALL local caches? Knowledge cards will remain on Cloud.')) return;
            await fetch(`${API_BASE}/cache/clear`, { method: 'POST' });
            await refreshData();
        }

        async function deleteLocalCache(uuid) {
            await fetch(`${API_BASE}/file/${uuid}`, { method: 'DELETE' });
            await refreshData();
        }

        async function deleteMemo(uuid) {
            if (!confirm('Are you sure you want to permanently delete this knowledge card?')) return;
            await fetch(`${API_BASE}/card/${uuid}`, { method: 'DELETE' });
            await refreshData();
        }

        function downloadContent(uuid) {
            window.open(`${API_BASE}/file/${uuid}/content`, '_blank');
        }

        function openUploadModal() { document.getElementById('uploadModal').style.display = 'flex'; }
        function closeUploadModal() { document.getElementById('uploadModal').style.display = 'none'; }

        async function handleFileUpload() {
            const fileInput = document.getElementById('fileInput');
            const titleInput = document.getElementById('upload-title');
            const tagsInput = document.getElementById('upload-tags');

            if (fileInput.files.length === 0) return alert('Select a file first');

            const btn = document.getElementById('uploadBtn');
            btn.innerHTML = '<span class="loader"></span> Creating...';
            btn.disabled = true;

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            formData.append('title', titleInput.value);
            formData.append('tags', tagsInput.value);

            try {
                const res = await fetch(`${API_BASE}/file`, {
                    method: 'POST',
                    body: formData
                });
                if (res.ok) {
                    closeUploadModal();
                    await refreshData();
                } else {
                    alert('Upload failed');
                }
            } catch (e) {
                console.error(e);
            } finally {
                btn.innerHTML = 'Create Card';
                btn.disabled = false;
            }
        }

        async function refreshData() {
            await fetchStatus();
            await fetchMemos();
        }

        setInterval(refreshData, 30000);
        refreshData();
    </script>
</body>

</html>
