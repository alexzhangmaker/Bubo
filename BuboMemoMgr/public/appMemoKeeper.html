<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MemoKeeper - 知识工程管理</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Marked.js for Markdown -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary: #6366f1;
            --primary-light: #818cf8;
            --secondary: #64748b;
            --bg: #0f172a;
            --sidebar-bg: rgba(30, 41, 59, 0.7);
            --card-bg: rgba(30, 41, 59, 0.5);
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --border: rgba(255, 255, 255, 0.1);
            --glass-blur: 15px;
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image:
                radial-gradient(at 0% 0%, rgba(99, 102, 241, 0.15) 0px, transparent 50%),
                radial-gradient(at 100% 100%, rgba(16, 185, 129, 0.1) 0px, transparent 50%);
        }

        /* User Status Bar */
        header {
            height: 64px;
            padding: 0 24px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            border-bottom: 1px solid var(--border);
            backdrop-filter: blur(var(--glass-blur));
            z-index: 100;
        }

        .logo {
            font-family: 'Outfit', sans-serif;
            font-size: 20px;
            font-weight: 700;
            display: flex;
            align-items: center;
            gap: 10px;
            background: linear-gradient(135deg, var(--primary-light), var(--accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .user-status {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .user-avatar {
            width: 32px;
            height: 32px;
            border-radius: 50%;
            background: var(--primary);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
            font-weight: 600;
        }

        /* Layout Container */
        .app-container {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* Navigation Sidebar */
        aside {
            width: 280px;
            background: var(--sidebar-bg);
            backdrop-filter: blur(var(--glass-blur));
            border-right: 1px solid var(--border);
            display: flex;
            flex-direction: column;
            padding: 20px 0;
        }

        .nav-section {
            margin-bottom: 24px;
        }

        .nav-title {
            padding: 0 24px;
            font-size: 12px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .nav-item {
            padding: 10px 24px;
            display: flex;
            align-items: center;
            gap: 12px;
            color: var(--text-muted);
            cursor: pointer;
            transition: var(--transition);
            border-left: 3px solid transparent;
        }

        .nav-item:hover {
            color: var(--text-main);
            background: rgba(255, 255, 255, 0.05);
        }

        .nav-item.active {
            color: var(--primary-light);
            background: rgba(99, 102, 241, 0.1);
            border-left-color: var(--primary);
        }

        /* Main Area */
        main {
            flex: 1;
            overflow-y: auto;
            padding: 32px;
            scroll-behavior: smooth;
        }

        .main-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 32px;
        }

        .search-container {
            position: relative;
            width: 400px;
        }

        .search-container input {
            width: 100%;
            padding: 12px 16px 12px 48px;
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text-main);
            font-family: inherit;
            transition: var(--transition);
        }

        .search-container input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(99, 102, 241, 0.1);
        }

        .search-icon {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
        }

        /* Knowledge Card */
        .card-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 24px;
        }

        .card {
            background: var(--card-bg);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 24px;
            transition: var(--transition);
            cursor: pointer;
            display: flex;
            flex-direction: column;
            gap: 16px;
            backdrop-filter: blur(5px);
        }

        .card:hover {
            transform: translateY(-4px);
            border-color: var(--primary-light);
            box-shadow: 0 10px 30px -10px rgba(0, 0, 0, 0.5);
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .card-tag {
            font-size: 11px;
            font-weight: 600;
            padding: 4px 10px;
            border-radius: 20px;
            background: rgba(99, 102, 241, 0.15);
            color: var(--primary-light);
            text-transform: uppercase;
        }

        .card-time {
            font-size: 12px;
            color: var(--text-muted);
        }

        .card-question {
            font-size: 18px;
            font-weight: 600;
            line-height: 1.4;
            color: var(--text-main);
        }

        .card-preview {
            font-size: 14px;
            color: var(--text-muted);
            line-height: 1.6;
            display: -webkit-box;
            -webkit-line-clamp: 3;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        /* Detail Modal */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(8px);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            padding: 40px;
        }

        .modal-content {
            background: #1e293b;
            width: 100%;
            max-width: 900px;
            max-height: 90vh;
            border-radius: 24px;
            border: 1px solid var(--border);
            position: relative;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            animation: modalIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes modalIn {
            from {
                opacity: 0;
                transform: translateY(20px) scale(0.95);
            }

            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        .modal-header {
            padding: 32px 40px 16px;
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .close-btn {
            background: rgba(255, 255, 255, 0.05);
            border: none;
            color: var(--text-muted);
            width: 40px;
            height: 40px;
            border-radius: 50%;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: var(--transition);
        }

        .close-btn:hover {
            background: rgba(239, 68, 68, 0.1);
            color: #ef4444;
        }

        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 0 40px 40px;
            font-size: 16px;
            line-height: 1.8;
            color: #cbd5e1;
        }

        /* Markdown Styling */
        .markdown-body h3 {
            margin: 24px 0 16px;
            color: var(--text-main);
            border-bottom: 1px solid var(--border);
            padding-bottom: 8px;
        }

        .markdown-body p {
            margin-bottom: 16px;
        }

        .markdown-body strong {
            color: var(--primary-light);
            font-weight: 600;
        }

        .markdown-body ul {
            margin: 16px 0;
            padding-left: 20px;
        }

        .markdown-body li {
            margin-bottom: 8px;
        }

        .markdown-body em {
            color: var(--text-muted);
            font-style: italic;
        }

        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 8px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 4px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: var(--secondary);
        }

        .empty-state {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 400px;
            color: var(--text-muted);
        }
    </style>
</head>

<body>
    <header>
        <div class="logo">
            <i data-lucide="brain-circuit"></i>
            MemoKeeper
        </div>
        <div class="user-status">
            <span style="font-size: 14px; font-weight: 500;">知识攻坚战 · 2026</span>
            <div class="user-avatar">ZQ</div>
        </div>
    </header>

    <div class="app-container">
        <aside id="sidebar">
            <div class="nav-section">
                <div class="nav-title">工程项目</div>
                <div id="project-list">
                    <!-- Projects populated by JS -->
                </div>
            </div>
            <div class="nav-section">
                <div class="nav-title">维度检索</div>
                <div class="nav-item" data-filter="all">
                    <i data-lucide="layers"></i> 全部卡片
                </div>
                <div class="nav-item" data-filter="timeline">
                    <i data-lucide="clock"></i> 时光轴
                </div>
                <div class="nav-item" data-filter="starred">
                    <i data-lucide="star"></i> 精选卡片
                </div>
            </div>
        </aside>

        <main>
            <div class="main-header">
                <h1 id="view-title" font-family="'Outfit', sans-serif">浏览卡片</h1>
                <div class="search-container">
                    <i data-lucide="search" class="search-icon" size="18"></i>
                    <input type="text" id="search-input" placeholder="搜索知识点、大额资产、预收账款...">
                </div>
            </div>

            <div id="card-grid" class="card-list">
                <!-- Cards populated by JS -->
            </div>
        </main>
    </div>

    <!-- Card Detail Modal -->
    <div id="card-modal" class="modal">
        <div class="modal-content">
            <div class="modal-header">
                <div id="modal-tags"></div>
                <button class="close-btn" id="modal-close">
                    <i data-lucide="x" size="20"></i>
                </button>
            </div>
            <div class="modal-body">
                <h2 id="modal-question" style="margin-bottom: 24px;"></h2>
                <div id="modal-answer" class="markdown-body"></div>
                <div id="modal-meta"
                    style="margin-top: 32px; border-top: 1px solid var(--border); padding-top: 20px; font-size: 12px; color: var(--text-muted);">
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '/api';

        // --- State ---
        let allMemos = [];
        let projects = [];
        let activeProject = null;
        let searchQuery = '';
        let activeFilter = 'all'; // 'all', 'timeline', 'starred'

        // --- DOM Elements ---
        const projectList = document.getElementById('project-list');
        const cardGrid = document.getElementById('card-grid');
        const viewTitle = document.getElementById('view-title');
        const searchInput = document.getElementById('search-input');
        const cardModal = document.getElementById('card-modal');
        const modalClose = document.getElementById('modal-close');

        // --- Functions ---
        async function init() {
            await fetchMemos();
            setupEventListeners();
            lucide.createIcons();
        }

        async function fetchMemos() {
            try {
                const res = await fetch(`${API_BASE}/metadata`);
                const data = await res.json();
                allMemos = data.map(m => ({
                    id: m.uuid,
                    question: m.memo_title || m.name,
                    tags: (m.memo_tags || '').split(',').map(t => t.trim()).filter(Boolean),
                    timestamp: m.created_at,
                    size: m.size,
                    starred: false // Could derive from a specific tag or DB field
                }));

                // Extract unique tags as projects
                const tagSet = new Set();
                allMemos.forEach(m => m.tags.forEach(t => tagSet.add(t)));
                projects = Array.from(tagSet).sort().map(t => ({
                    id: t,
                    name: t,
                    icon: 'tag'
                }));

                renderProjects();
                renderCards();
            } catch (err) {
                console.error('Failed to load memos:', err);
                cardGrid.innerHTML = `<div class="empty-state"><p style="color:red;">Error loading data</p></div>`;
            }
        }

        function renderProjects() {
            projectList.innerHTML = projects.map(p => `
                <div class="nav-item ${activeProject === p.id ? 'active' : ''}" onclick="filterByProject('${p.id}')">
                    <i data-lucide="${p.icon}" size="18"></i> ${p.name}
                </div>
            `).join('');
            lucide.createIcons();
        }

        function formatBytes(bytes) {
            if (!+bytes) return '0 B';
            const k = 1024;
            const sizes = ['B', 'KB', 'MB', 'GB'];
            const i = Math.floor(Math.log(bytes) / Math.log(k));
            return `${parseFloat((bytes / Math.pow(k, i)).toFixed(1))} ${sizes[i]}`;
        }

        function renderCards() {
            let filteredCards = [...allMemos].filter(c => {
                const matchesProject = !activeProject || c.tags.includes(activeProject);
                const matchesSearch = c.question.toLowerCase().includes(searchQuery.toLowerCase()) ||
                    c.tags.some(t => t.toLowerCase().includes(searchQuery.toLowerCase()));
                return matchesProject && matchesSearch;
            });

            if (activeFilter === 'timeline') {
                filteredCards.sort((a, b) => new Date(b.timestamp) - new Date(a.timestamp));
            } else if (activeFilter === 'starred') {
                filteredCards = filteredCards.filter(c => c.starred);
            }

            if (filteredCards.length === 0) {
                cardGrid.innerHTML = `
                    <div class="empty-state">
                        <i data-lucide="ghost" size="48" style="margin-bottom: 16px; opacity: 0.5;"></i>
                        <p>未找到相关结论卡片</p>
                    </div>
                `;
            } else {
                cardGrid.innerHTML = filteredCards.map(c => `
                    <div class="card" onclick="openCard('${c.id}')">
                        <div class="card-header">
                            <div class="card-tag">${c.tags[0] || 'Uncategorized'}</div>
                            <span class="card-time">${new Date(c.timestamp).toLocaleDateString()}</span>
                        </div>
                        <div class="card-question">${c.question}</div>
                        <div class="card-preview">
                            <i data-lucide="file-text" size="14" style="display:inline; vertical-align:middle; opacity:0.7"></i> 
                            Click to load content (${formatBytes(c.size)})
                        </div>
                    </div>
                `).join('');
            }
            lucide.createIcons();
        }

        function filterByProject(projectId) {
            activeProject = activeProject === projectId ? null : projectId;
            updateViewTitle();
            renderProjects();
            renderCards();
        }

        function updateViewTitle() {
            if (activeProject) {
                const project = projects.find(p => p.id === activeProject);
                viewTitle.textContent = project.name;
            } else {
                switch (activeFilter) {
                    case 'timeline': viewTitle.textContent = '时光轴'; break;
                    case 'starred': viewTitle.textContent = '精选卡片'; break;
                    default: viewTitle.textContent = '全部卡片';
                }
            }
        }

        async function openCard(id) {
            const card = allMemos.find(c => c.id === id);
            if (!card) return;

            document.getElementById('modal-tags').innerHTML = card.tags.map(t => `<span class="card-tag" style="margin-right: 8px">${t}</span>`).join('');
            document.getElementById('modal-question').textContent = card.question;
            document.getElementById('modal-meta').textContent = `Size: ${formatBytes(card.size)} | 时间：${new Date(card.timestamp).toLocaleString()}`;
            
            const contentDiv = document.getElementById('modal-answer');
            contentDiv.innerHTML = '<p style="color: var(--text-muted);"><i data-lucide="loader-2" class="lucide-spin"></i> Loading content...</p>';
            
            cardModal.style.display = 'flex';
            document.body.style.overflow = 'hidden';
            lucide.createIcons();

            try {
                const res = await fetch(`${API_BASE}/file/${id}/content`);
                if (!res.ok) throw new Error('Failed to load content');
                const text = await res.text();
                // Check if it's markdown or pdf (basic check based on extension logic or just render text)
                contentDiv.innerHTML = marked.parse(text);
            } catch (err) {
                contentDiv.innerHTML = `<p style="color: var(--danger);"><i data-lucide="alert-circle"></i> Error loading document content</p>`;
            }
            lucide.createIcons();
        }

        function closeCard() {
            cardModal.style.display = 'none';
            document.body.style.overflow = 'auto';
        }

        function setupEventListeners() {
            searchInput.addEventListener('input', (e) => {
                searchQuery = e.target.value;
                renderCards();
            });

            modalClose.addEventListener('click', closeCard);

            cardModal.addEventListener('click', (e) => {
                if (e.target === cardModal) closeCard();
            });

            // Global escape key to close modal
            window.addEventListener('keydown', (e) => {
                if (e.key === 'Escape') closeCard();
            });

            // Filter items
            document.querySelectorAll('[data-filter]').forEach(item => {
                item.addEventListener('click', () => {
                    const filter = item.getAttribute('data-filter');
                    activeFilter = filter;
                    document.querySelectorAll('[data-filter]').forEach(el => el.classList.remove('active'));
                    item.classList.add('active');

                    activeProject = null; // Clear project filter when switching main category
                    updateViewTitle();
                    renderProjects();
                    renderCards();
                });
            });
        }

        // --- Start App ---
        init();
    </script>
</body>

</html>
