<!DOCTYPE html>
<html>

<head>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Oxygen, Ubuntu, Cantarell, "Open Sans", "Helvetica Neue", sans-serif;
            height: 100vh;
            display: flex;
            flex-direction: column;
            background-color: #f6f6f6;
        }

        .toolbar {
            display: flex;
            justify-content: flex-end;
            padding: 10px;
            background-color: #ffffff;
            border-bottom: 1px solid #e0e0e0;
        }

        .icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 5px;
            border-radius: 4px;
            color: #5f6368;
        }

        .icon-btn:hover {
            background-color: #f1f3f4;
        }

        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 0;
            /* Changed locally */
        }

        h2 {
            margin-top: 0;
            font-size: 16px;
            color: #202124;
        }

        textarea {
            flex: 1;
            width: 100%;
            border: 1px solid #dadce0;
            border-radius: 8px;
            padding: 12px;
            font-family: inherit;
            font-size: 14px;
            resize: none;
            box-sizing: border-box;
            outline: none;
        }

        textarea:focus {
            border-color: #1a73e8;
            box-shadow: 0 0 0 2px rgba(26, 115, 232, 0.2);
        }
    </style>
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div class="toolbar">
        <button id="add-note-btn" class="icon-btn" title="Add Note">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
                <path d="M440-440H200v-80h240v-240h80v240h240v80H520v240h-80v-240Z" />
            </svg>
        </button>
        <button id="search-btn" class="icon-btn" title="Search Notes">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
                <path
                    d="M784-120 532-372q-30 24-69 38t-83 14q-109 0-184.5-75.5T120-580q0-109 75.5-184.5T380-840q109 0 184.5 75.5T640-580q0 44-14 83t-38 69l252 252-56 56ZM380-400q75 0 127.5-52.5T560-580q0-75-52.5-127.5T380-760q-75 0-127.5 52.5T200-580q0 75 52.5 127.5T380-400Z" />
            </svg>
        </button>
        <div style="width: 1px; height: 24px; background: #e0e0e0; margin: 0 8px;"></div>
        <button id="toggle-reader-btn" class="icon-btn" title="Toggle Reader Mode">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
                <path
                    d="M320-240h320v-80H320v80Zm0-160h320v-80H320v80ZM240-80q-33 0-56.5-23.5T160-160v-640q0-33 23.5-56.5T240-880h320l240 240v480q0 33-23.5 56.5T720-80H240Zm280-520v-200H240v640h480v-440H520ZM240-800v200-200 640-640Z" />
            </svg>
        </button>
        <div style="width: 1px; height: 24px; background: #e0e0e0; margin: 0 8px;"></div>
        <button id="theme-light-btn" class="icon-btn" title="Light Theme">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
                <path
                    d="M440-760v-160h80v160h-80Zm266 110-55-55 112-115 56 57-113 113Zm54 210v-80h160v80H760ZM440-40v-160h80v160h-80ZM254-652 140-763l57-56 113 113-56 54Zm450 652-56-54 114-115 55 55-113 114ZM40-440v-80h160v80H40Zm100 288-56-55 115-115 54 57-113 113Zm340-168q-50 0-85-35t-35-85q0-50 35-85t85-35q50 0 85 35t35 85q0 50-35 85t-85 35Z" />
            </svg>
        </button>
        <button id="theme-sepia-btn" class="icon-btn" title="Sepia Theme" style="color: #bfa05f;">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
                <path
                    d="M480-80q-83 0-156-31.5T197-197q-54-54-85.5-127T80-480q0-83 31.5-156T197-763q54-54 127-85.5T480-880q83 0 156 31.5T763-763q54 54 85.5 127T880-480q0 83-31.5 156T763-197q-54 54-127 85.5T480-80Zm0-80q134 0 227-93t93-227q0-134-93-227t-227-93q-134 0-227 93t-93 227q0 134 93 227t227 93Zm0-320Z" />
            </svg>
        </button>
        <button id="theme-dark-btn" class="icon-btn" title="Dark Theme" style="color: #555;">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
                <path
                    d="M480-120q-150 0-255-105T120-480q0-150 105-255t255-105q14 0 27.5 1t26.5 3q-41 29-65.5 75.5T444-660q0 90 63 153t153 63q55 0 101-24.5t75-65.5q2 13 3 26.5t1 27.5q0 150-105 255T480-120Z" />
            </svg>
        </button>
        <div style="width: 1px; height: 24px; background: #e0e0e0; margin: 0 8px;"></div>
        <button id="account-btn" class="icon-btn" title="Account">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
                <path
                    d="M480-480q-66 0-113-47t-47-113q0-66 47-113t113-47q66 0 113 47t47 113q0 66-47 113t-113 47ZM160-160v-112q0-34 17.5-62.5T224-378q62-31 126-46.5T480-440q66 0 130 15.5T736-378q29 15 46.5 43.5T800-272v112H160Z" />
            </svg>
        </button>
        <button id="settings-btn" class="icon-btn" title="Settings">
            <svg xmlns="http://www.w3.org/2000/svg" height="24" viewBox="0 -960 960 960" width="24" fill="currentColor">
                <path
                    d="M480-480q33 0 56.5-23.5T560-560q0-33-23.5-56.5T480-640q-33 0-56.5 23.5T400-560q0 33 23.5 56.5T480-480Zm0 294q122-112 181-203.5T720-552q0-109-69.5-178.5T480-800q-101 0-170.5 69.5T240-552q0 71 59 162.5T480-186Zm0 106Q319-217 239.5-334.5T160-552q0-150 96.5-239T480-880q127 0 223.5 89T800-552q0 100-79.5 217.5T480-80Zm0-480Z" />
                <path
                    d="m370-80-16-128q-13-5-24.5-12T307-235l-119 50L78-375l103-78q-1-7-1-13.5v-27q0-6.5 1-13.5L78-585l110-190 119 50q11-8 23-15t24-12l16-128h220l16 128q13 5 24.5 12t22.5 15l119-50 110 190-103 78q1 7 1 13.5v27q0 6.5-1 13.5l103 78-110 190-119-50q-11 8-23 15t-24 12l-16 128H370Zm112-260q58 0 99-41t41-99q0-58-41-99t-99-41q-59 0-99.5 41T342-480q0 58 40.5 99t99.5 41Zm0-80q-25 0-42.5-17.5T422-480q0-25 17.5-42.5T480-565q25 0 42.5 17.5T540-480q0 25-17.5 42.5T480-420Z" />
            </svg>
        </button>
    </div>
    <div id="search-bar" style="display: none; padding: 10px; background: #fff; border-bottom: 1px solid #ddd;">
        <input type="text" id="search-input" placeholder="Search notes..."
            style="width: 100%; box-sizing: border-box; padding: 8px; border: 1px solid #dadce0; border-radius: 4px; outline: none;">
    </div>

    <main style="padding: 0;">
        <div id="account-panel" style="display: none; padding: 20px; background: #fff; border-bottom: 1px solid #eee;">
            <h2 style="margin-top: 0;">Account</h2>
            <div id="auth-status-container" style="text-align: center; padding: 10px 0;">
                <div id="user-info" style="display: none; margin-bottom: 20px;">
                    <img id="user-avatar" src=""
                        style="width: 64px; height: 64px; border-radius: 50%; margin-bottom: 10px; border: 2px solid #eee;">
                    <div id="user-email" style="font-weight: 500; color: #333;"></div>
                    <div id="user-name" style="font-size: 12px; color: #777;"></div>
                </div>
                <button id="login-btn"
                    style="width: 100%; padding: 10px; background: #4285F4; color: white; border: none; border-radius: 4px; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 10px; font-weight: 500;">
                    <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M17.64 9.2c0-.63-.06-1.25-.16-1.84H9v3.47h4.84c-.21 1.12-.84 2.07-1.8 2.72v2.26h2.92c1.71-1.57 2.68-3.88 2.68-6.61z"
                            fill="#4285F4" />
                        <path
                            d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.92-2.26c-.8.54-1.83.86-3.04.86-2.34 0-4.32-1.58-5.03-3.71H.95v2.3C2.43 15.98 5.48 18 9 18z"
                            fill="#34A853" />
                        <path
                            d="M3.97 10.71c-.18-.54-.28-1.12-.28-1.71s.1-1.17.28-1.71V4.99H.95C.35 6.19 0 7.56 0 9s.35 2.81.95 4.01l3.02-2.3z"
                            fill="#FBBC05" />
                        <path
                            d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58C13.47.89 11.43 0 9 0 5.48 0 2.43 2.02.95 4.99l3.02 2.3c.71-2.13 2.69-3.71 5.03-3.71z"
                            fill="#EA4335" />
                    </svg>
                    Sign in with Google
                </button>
                <button id="logout-btn"
                    style="display: none; width: 100%; padding: 10px; background: #fff; color: #ea4335; border: 1px solid #ea4335; border-radius: 4px; cursor: pointer; font-weight: 500;">Sign
                    Out</button>
            </div>
        </div>

        <div id="settings-panel"
            style="display: none; padding: 15px; background: #fff; border-bottom: 1px solid #eee; overflow-y: auto; max-height: 80vh;">
            <h2 style="margin-top: 0;">Settings</h2>
            <label for="patterns">URL Patterns (one per line):</label>
            <textarea id="patterns" style="width: 100%; height: 80px; margin-top: 5px;"></textarea>

            <h4 style="margin: 20px 0 10px; font-size: 14px; border-top: 1px solid #eee; padding-top: 15px;">Reader
                Appearance</h4>
            <div class="setting-input-group" style="display: flex; flex-direction: column; gap: 8px;">
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label style="font-size: 13px;">Font:</label>
                    <select id="reader-font-select"
                        style="padding: 5px; border-radius: 4px; border: 1px solid #dadce0;">
                        <option value="'Times New Roman', Times, serif">Serif</option>
                        <option value="'Inter', -apple-system, sans-serif">Sans-Serif</option>
                        <option value="'Georgia', serif">Georgia</option>
                        <option value="'Roboto Mono', monospace">Mono</option>
                    </select>
                </div>
                <div style="display: flex; align-items: center; justify-content: space-between;">
                    <label style="font-size: 13px;">Size (px):</label>
                    <input type="number" id="reader-size-input" min="12" max="40" value="20"
                        style="width: 60px; padding: 5px; border-radius: 4px; border: 1px solid #dadce0;">
                </div>
                <div style="display: flex; flex-direction: column; gap: 4px;">
                    <div style="display: flex; align-items: center; justify-content: space-between;">
                        <label style="font-size: 13px;">Content Width:</label>
                        <span id="reader-width-value" style="font-size: 12px; color: #666;">800px</span>
                    </div>
                    <input type="range" id="reader-width-input" min="400" max="1200" step="50" value="800"
                        style="width: 100%;">
                </div>
            </div>

            <h4 style="margin: 20px 0 10px; font-size: 14px; border-top: 1px solid #eee; padding-top: 15px;">Firebase
                Config</h4>
            <div class="setting-input-group" style="display: flex; flex-direction: column; gap: 8px;">
                <input type="text" id="fb-api-key" placeholder="API Key"
                    style="width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #dadce0; border-radius: 4px;">
                <input type="text" id="fb-db-url" placeholder="RTDB URL (https://...)"
                    style="width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #dadce0; border-radius: 4px;">
                <input type="text" id="fb-project-id" placeholder="Project ID"
                    style="width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #dadce0; border-radius: 4px;">
            </div>

            <h4 style="margin: 20px 0 10px; font-size: 14px;">Firebase Storage Config</h4>
            <input type="text" id="fb-storage-bucket" placeholder="Storage Bucket (e.g., project.appspot.com)"
                style="width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #dadce0; border-radius: 4px; margin-bottom: 8px;">
            <input type="text" id="fb-storage-path" placeholder="Storage Path (e.g., notes)"
                style="width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #dadce0; border-radius: 4px;">
            <h4 style="margin: 20px 0 10px; font-size: 14px; border-top: 1px solid #eee; padding-top: 15px;">Google
                Drive Config</h4>
            <input type="text" id="gd-folder-name" placeholder="Target Folder Name (e.g., WebNotes)"
                style="width: 100%; box-sizing: border-box; padding: 10px; border: 1px solid #dadce0; border-radius: 4px;">

            <div
                style="margin-top: 20px; text-align: right; display: flex; justify-content: flex-end; align-items: center;">
                <span id="status" style="margin-right: 10px; color: green; font-size: 12px;"></span>
                <button id="save-settings"
                    style="padding: 8px 20px; background: #1a73e8; color: white; border: none; border-radius: 4px; cursor: pointer;">Save</button>
            </div>
        </div>
        <div id="notes-list" style="flex: 1; overflow-y: auto; padding: 16px;">
            <!-- Cards will be injected here -->
            <div style="color: #777; font-style: italic; text-align: center; margin-top: 50px;">
                Select text in Reader Mode to add a note.
            </div>
        </div>
    </main>
    <script src="sidepanel.js"></script>
</body>

</html>
