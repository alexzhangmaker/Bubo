<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetterYouTube Settings</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="sidepanel.css">
</head>

<body>
    <div class="app-wrapper">
        <!-- Top Toolbar -->
        <header id="status-bar">
            <div class="brand">
                <h1>BetterYouTube</h1>
            </div>
            <div class="user-status">
                <span id="user-email">Guest</span>
                <div class="status-indicator">
                    <span id="socket-status" class="status-dot offline"></span>
                </div>
            </div>
        </header>

        <!-- Main Content: Bookmark Navigator -->
        <main id="bookmark-navigator">
            <div id="folder-list" class="folder-list">
                <!-- Folders and videos will be injected here -->
                <div class="empty-state">
                    <p>No collections yet. Use the + button to add the current video.</p>
                </div>
            </div>
        </main>

        <!-- Bottom action bar -->
        <footer id="action-bar">
            <button id="add-current-btn" class="action-btn" title="Add Current Video">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 48 48">
                    <g fill="none" stroke-linejoin="round" stroke-width="4">
                        <path fill="#2F88FF" stroke="#000"
                            d="M10 44C8.89543 44 8 43.1046 8 42V6C8 4.89543 8.89543 4 10 4H38C39.1046 4 40 4.89543 40 6V42C40 43.1046 39.1046 44 38 44H10Z" />
                        <path fill="#43CCF8" fill-rule="evenodd" stroke="#fff" stroke-linecap="round"
                            d="M21 22V4H33V22L27 15.7273L21 22Z" clip-rule="evenodd" />
                        <path stroke="#000" stroke-linecap="round" d="M10 4H38" />
                    </g>
                </svg>
            </button>
            <button id="create-folder-btn" class="action-btn" title="Create New Folder">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24">
                    <path fill="none" stroke="currentColor" stroke-linecap="round" stroke-linejoin="round"
                        stroke-width="1.5"
                        d="M18 13.5v8m4-4h-8m-7-11h9.75c2.107 0 3.16 0 3.917.506a3 3 0 0 1 .827.827c.465.695.502 1.851.505 3.667M12 6.5l-.633-1.267c-.525-1.05-1.005-2.106-2.168-2.542C8.69 2.5 8.108 2.5 6.944 2.5c-1.816 0-2.724 0-3.406.38A3 3 0 0 0 2.38 4.038C2 4.72 2 5.628 2 7.444V10.5c0 4.714 0 7.071 1.464 8.535C4.822 20.394 6.944 20.493 11 20.5"
                        color="currentColor" />
                </svg>
            </button>
            <div class="spacer"></div>
            <button id="home-btn" class="action-btn" title="Home">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z" />
                </svg>
            </button>
            <button id="settings-btn" class="action-btn" title="Settings">
                <svg viewBox="0 0 24 24" width="20" height="20">
                    <path fill="currentColor"
                        d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z" />
                </svg>
            </button>
        </footer>

        <!-- Settings Modal -->
        <div id="settings-modal" class="modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h2>Settings & Management</h2>
                    <button class="close-modal">&times;</button>
                </div>
                <div class="modal-body">
                    <section class="config-section">
                        <h3>Blocked Keywords</h3>
                        <div class="input-group">
                            <input type="text" id="keyword-input" placeholder="Add keyword...">
                            <button id="add-keyword" class="btn-primary">Add</button>
                        </div>
                        <ul id="keyword-list" class="tag-list"></ul>
                    </section>

                    <section class="config-section">
                        <h3>Default Filters</h3>
                        <div class="toggle-list">
                            <div class="toggle-group">
                                <span>Adult Content</span>
                                <label class="switch">
                                    <input type="checkbox" id="filter-adult" checked>
                                    <span class="slider round"></span>
                                </label>
                            </div>
                            <!-- ... other filters ... -->
                        </div>
                    </section>

                    <section class="config-section">
                        <h3>Data Management</h3>
                        <div class="button-row">
                            <button id="export-json" class="btn-secondary">Export Data (JSON)</button>
                            <button id="import-trigger" class="btn-secondary">Import Data (JSON)</button>
                            <input type="file" id="import-json" style="display: none;" accept=".json">
                        </div>
                    </section>
                </div>
            </div>
        </div>
    </div>
    <script src="sidepanel.js"></script>
</body>

</html>
