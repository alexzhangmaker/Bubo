<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BetterYahoo Sidepanel</title>
    <link rel="stylesheet" href="sidepanel.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="app-container">
        <!-- Top Status Bar -->
        <header class="status-bar">
            <div class="logo-area">
                <img src="../icons/icon.png" alt="BetterYahoo" class="logo-small">
                <span class="app-title">BetterYahoo</span>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span id="currentStatusText">Ready</span>
            </div>
        </header>

        <!-- Main Content (Folders & Articles) -->
        <main class="content-area">
            <div id="folderContainer" class="folder-list">
                <!-- Folders injected here -->
            </div>
        </main>

        <!-- Bottom Navigation Toolbar -->
        <nav class="navigation-toolbar">
            <button class="nav-btn" id="homeBtn" title="Home">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M10 20v-6h4v6h5v-8h3L12 3 2 12h3v8z"/></svg>
            </button>
            <button class="nav-btn" id="addFolderBtn" title="New Folder">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M20 6h-8l-2-2H4c-1.1 0-1.99.9-1.99 2L2 18c0 1.1.9 2 2 2h16c1.1 0 2-.9 2-2V8c0-1.1-.9-2-2-2zm-1 8h-3v3h-2v-3h-3v-2h3V9h2v3h3v2z"/></svg>
            </button>
            <button class="nav-btn" id="exportBtn" title="Export JSON">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19 9h-4V3H9v6H5l7 7 7-7zM5 18v2h14v-2H5z"/></svg>
            </button>
            <button class="nav-btn" id="settingBtn" title="Settings">
                <svg viewBox="0 0 24 24" width="24" height="24"><path fill="currentColor" d="M19.14 12.94c.04-.3.06-.61.06-.94 0-.32-.02-.64-.07-.94l2.03-1.58c.18-.14.23-.41.12-.61l-1.92-3.32c-.12-.22-.37-.29-.59-.22l-2.39.96c-.5-.38-1.03-.7-1.62-.94l-.36-2.54c-.04-.24-.24-.41-.48-.41h-3.84c-.24 0-.43.17-.47.41l-.36 2.54c-.59.24-1.13.57-1.62.94l-2.39-.96c-.22-.08-.47 0-.59.22L2.74 8.87c-.12.21-.08.47.12.61l2.03 1.58c-.05.3-.09.63-.09.94s.02.64.07.94l-2.03 1.58c-.18.14-.23.41-.12.61l1.92 3.32c.12.22.37.29.59.22l2.39-.96c.5.38 1.03.7 1.62.94l.36 2.54c.05.24.24.41.48.41h3.84c.24 0 .44-.17.47-.41l.36-2.54c.59-.24 1.13-.56 1.62-.94l2.39.96c.22.08.47 0 .59-.22l1.92-3.32c.12-.22.07-.47-.12-.61l-2.01-1.58zM12 15.6c-1.98 0-3.6-1.62-3.6-3.6s1.62-3.6 3.6-3.6 3.6 1.62 3.6 3.6-1.62 3.6-3.6 3.6z"/></svg>
            </button>
        </nav>
    </div>

    <!-- Modals -->
    <div id="addFolderModal" class="modal">
        <div class="modal-content">
            <h3>New Folder</h3>
            <input type="text" id="folderNameInput" placeholder="Enter folder name">
            <div class="modal-actions">
                <button id="cancelFolderBtn" class="secondary-btn">Cancel</button>
                <button id="confirmFolderBtn" class="primary-btn">Create</button>
            </div>
        </div>
    </div>

    <!-- Scripts -->
    <script type="module" src="sidepanel.js"></script>
</body>
</html>
