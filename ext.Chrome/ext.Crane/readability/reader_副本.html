<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>阅读模式 - 智能阅读助手</title>
    <link rel="stylesheet" href="reader.css">
</head>
<body>
    <div class="reader-container">
        <!-- 顶部工具栏 -->
        <header class="reader-header">
            <div class="header-left">
                <button id="backBtn" class="header-btn" title="返回">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M20 11H7.83l5.59-5.59L12 4l-8 8 8 8 1.41-1.41L7.83 13H20v-2z"/>
                    </svg>
                </button>
                <h1 class="header-title">智能阅读助手</h1>
            </div>
            <div class="header-right">
                <button id="saveArticle" class="header-btn" title="保存文章">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M17 3H5c-1.11 0-2 .9-2 2v14c0 1.1.89 2 2 2h14c1.1 0 2-.9 2-2V7l-4-4zm-5 16c-1.66 0-3-1.34-3-3s1.34-3 3-3 3 1.34 3 3-1.34 3-3 3zm3-10H5V5h10v4z"/>
                    </svg>
                </button>

                <button id="saveePub" class="header-btn" title="电子书">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"><path fill="#000000" d="M21 8c-.202 0-4.85.029-9 2.008C7.85 8.029 3.202 8 3 8a1 1 0 0 0-1 1v9.883a1 1 0 0 0 .305.719c.195.188.48.305.729.28l.127-.001c.683 0 4.296.098 8.416 2.025c.016.008.034.005.05.011c.119.049.244.083.373.083s.254-.034.374-.083c.016-.006.034-.003.05-.011c4.12-1.928 7.733-2.025 8.416-2.025l.127.001c.238.025.533-.092.729-.28c.194-.189.304-.449.304-.719V9a1 1 0 0 0-1-1zM4 10.049c1.485.111 4.381.48 7 1.692v7.742c-3-1.175-5.59-1.494-7-1.576v-7.858zm16 7.858c-1.41.082-4 .401-7 1.576v-7.742c2.619-1.212 5.515-1.581 7-1.692v7.858z"/><circle cx="12" cy="5" r="3" fill="#000000"/></svg>
                </button>
                <button id="shareArticle" class="header-btn" title="分享">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18 16.08c-.76 0-1.44.3-1.96.77L8.91 12.7c.05-.23.09-.46.09-.7s-.04-.47-.09-.7l7.05-4.11c.54.5 1.25.81 2.04.81 1.66 0 3-1.34 3-3s-1.34-3-3-3-3 1.34-3 3c0 .24.04.47.09.7L8.04 9.81C7.5 9.31 6.79 9 6 9c-1.66 0-3 1.34-3 3s1.34 3 3 3c.79 0 1.5-.31 2.04-.81l7.12 4.16c-.05.21-.08.43-.08.65 0 1.61 1.31 2.92 2.92 2.92 1.61 0 2.92-1.31 2.92-2.92s-1.31-2.92-2.92-2.92z"/>
                    </svg>
                </button>
                <button id="toggleSidebar" class="header-btn" title="显示/隐藏设置">
                    <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/>
                    </svg>
                </button>
            </div>
        </header>

        <div class="reader-main">
            <!-- 左侧目录导航 -->
            <aside class="toc-sidebar" id="tocSidebar">
                <div class="toc-header">
                    <h3>目录导航</h3>
                </div>
                <div class="toc-content">
                    <div id="tocContainer" class="toc-container">
                        <!-- 目录会动态生成 -->
                    </div>
                </div>
            </aside>

            <!-- 中间文章内容区域 -->
            <main class="article-content">
                <article class="article-main">
                    <header class="article-header">
                        <h1 id="articleTitle">文章标题</h1>
                        <div class="article-meta">
                            <span id="articleSite">来源网站</span>
                            <span class="divider">•</span>
                            <span id="articleLength">阅读时间</span>
                            <span class="divider">•</span>
                            <span id="wordCount">字数</span>
                        </div>
                    </header>
                    
                    <div id="articleContent" class="article-body">
                        <p>文章内容加载中...</p>
                    </div>
                </article>
            </main>

            <!-- 右侧工具条 -->
            <aside class="tool-sidebar" id="toolSidebar">
                <div class="tool-buttons">
                    <button id="highlight" class="tool-btn" title="高亮文本">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M6 14l3 3v5h6v-5l3-3V9H6v5zm5-12h2v3h-2V2zM3.5 5.88l1.41-1.41 2.12 2.12L5.62 8 3.5 5.88zm13.46.71l2.12-2.12 1.41 1.41L18.38 8l-1.42-1.41z"/>
                        </svg>
                    </button>
                    <button id="addNote" class="tool-btn" title="添加笔记">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M14 2H6c-1.1 0-1.99.9-1.99 2L4 20c0 1.1.89 2 1.99 2H18c1.1 0 2-.9 2-2V8l-6-6zm2 14h-3v3h-2v-3H8v-2h3v-3h2v3h3v2zm-3-7V3.5L18.5 9H13z"/>
                        </svg>
                    </button>
                    <button id="fontIncrease" class="tool-btn" title="增大字体">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M9 4v3h5v12h3V7h5V4H9zm-6 8h3v7h3v-7h3V9H3v3z"/>
                        </svg>
                    </button>
                    <button id="fontDecrease" class="tool-btn" title="减小字体">
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor">
                            <path d="M5.5 9h13v2h-13z"/>
                        </svg>
                    </button>
                </div>
            </aside>

            <!-- 右侧设置面板 -->
            <aside class="reader-sidebar noShow" id="readerSidebar">
                <div class="sidebar-content">
                    <div class="sidebar-section">
                        <h3>阅读设置</h3>
                        
                        <div class="setting-group">
                            <label>字体大小</label>
                            <div class="setting-control">
                                <input type="range" id="fontSize" min="14" max="24" value="18" step="1">
                                <span id="fontSizeValue">18px</span>
                            </div>
                        </div>

                        <div class="setting-group">
                            <label>字体族</label>
                            <select id="fontFamily">
                                <option value="system-ui">系统字体</option>
                                <option value="'Noto Serif SC', serif">衬线体</option>
                                <option value="'PingFang SC', 'Microsoft YaHei', sans-serif">无衬线体</option>
                                <option value="'Courier New', monospace">等宽字体</option>
                            </select>
                        </div>

                        <div class="setting-group">
                            <label>行高</label>
                            <div class="setting-control">
                                <input type="range" id="lineHeight" min="1.4" max="2.2" value="1.6" step="0.1">
                                <span id="lineHeightValue">1.6</span>
                            </div>
                        </div>

                        <div class="setting-group">
                            <label>内容宽度</label>
                            <div class="setting-control">
                                <input type="range" id="contentWidth" min="600" max="1200" value="800" step="10">
                                <span id="contentWidthValue">800px</span>
                            </div>
                        </div>

                         <div class="setting-group">
                            <h4>导出功能</h4>
                            <button id="shareBtn" class="action-btn">分享</button>
                            <button id="exportEpub" class="action-btn">
                                <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
                                    <path d="M18 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2zM6 4h5v8l-2.5-1.5L6 12V4z"/>
                                </svg>
                                导出ePub
                            </button>
                        </div>
                    </div>

                    <div class="sidebar-section">
                        <h3>主题设置</h3>
                        <div class="theme-options">
                            <button class="theme-option active" data-theme="light">
                                <div class="theme-preview light-theme"></div>
                                <span>浅色</span>
                            </button>
                            <button class="theme-option" data-theme="dark">
                                <div class="theme-preview dark-theme"></div>
                                <span>深色</span>
                            </button>
                            <button class="theme-option" data-theme="sepia">
                                <div class="theme-preview sepia-theme"></div>
                                <span>护眼</span>
                            </button>
                        </div>
                    </div>
                </div>
            </aside>
        </div>
    </div>

     <script src="jszip.min.js"></script>
     <script src="epub-generator.js"></script>
    <script src="../content-scripts/tippy.min.js"></script>
    <script src="reader.js"></script>
</body>
</html>
