<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuboAIProxy Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #6366f1;
            --bg: #0f172a;
            --card-bg: #1e293b;
            --text: #f8fafc;
            --text-muted: #94a3b8;
            --border: #334155;
            --accent: #22d3ee;
            --success: #10b981;
            --warning: #f59e0b;
            --danger: #ef4444;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 1200px;
            display: grid;
            grid-template-columns: 350px 1fr;
            gap: 20px;
        }

        h1, h2, h3 { margin-top: 0; }

        header {
            grid-column: 1 / -1;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .card {
            background-color: var(--card-bg);
            padding: 20px;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        /* Command Dictionary Section */
        .command-editor {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        input, textarea, select {
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 6px;
            font-family: inherit;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 15px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        button:hover { opacity: 0.9; }

        /* Queue List Section */
        .queue-table {
            width: 100%;
            border-collapse: collapse;
        }

        .queue-table th, .queue-table td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 13px;
        }

        .status-badge {
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            text-transform: uppercase;
        }

        .status-pending { background-color: var(--border); color: var(--text-muted); }
        .status-processing { background-color: var(--warning); color: #000; }
        .status-completed { background-color: var(--success); color: #fff; }
        .status-failed { background-color: var(--danger); color: #fff; }

        .request-item:hover { background-color: rgba(255,255,255,0.02); cursor: pointer; }

        /* Modal / Detail View */
        #detail-view {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 100;
        }

        .modal {
            background: var(--card-bg);
            padding: 30px;
            border-radius: 16px;
            width: 600px;
            max-height: 80vh;
            overflow-y: auto;
        }

        pre {
            background: #000;
            padding: 15px;
            border-radius: 8px;
            overflow-x: auto;
            color: var(--accent);
            font-size: 12px;
        }

        .param-row {
            display: flex;
            gap: 10px;
            margin-bottom: 8px;
            align-items: center;
        }
        .param-row input { flex: 1; }
        .param-row button { background-color: var(--danger); padding: 5px 10px; }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>BuboAIProxy Console</h1>
            <div>
                <span id="server-status" style="color: var(--success)">● Online</span>
            </div>
        </header>

        <section class="card">
            <h3>Command Dictionary</h3>
            <div class="command-editor">
                <input type="text" id="cmd-name" placeholder="Command Name (e.g. summarize)">
                <select id="cmd-model">
                    <option value="gemini">Gemini</option>
                    <option value="deepseek">DeepSeek</option>
                </select>
                <textarea id="cmd-prompt" rows="8" placeholder="Prompt Template (use {{paramKey}} for variables)"></textarea>
                
                <div style="margin-top: 10px; border-top: 1px solid var(--border); padding-top: 10px;">
                    <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;">
                        <span style="font-size: 14px; color: var(--text-muted)">Define Parameters (Keys)</span>
                        <button type="button" onclick="addParamRow()" style="padding: 5px 10px; background-color: var(--success); font-size: 12px;">+ Add Param</button>
                    </div>
                    <div id="params-container">
                        <!-- Param rows go here -->
                    </div>
                </div>

                <button onclick="saveCommand()" style="margin-top: 10px;">Save / Update Command</button>
            </div>
            <div id="cmd-list" style="margin-top: 20px">
                <!-- List of existing commands -->
            </div>
        </section>

        <section class="card">
            <h3>Request Queue</h3>
            <table class="queue-table">
                <thead>
                    <tr>
                        <th>UUID</th>
                        <th>Command</th>
                        <th>Created</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="queue-body">
                    <!-- Requests will load here -->
                </tbody>
            </table>
        </section>

        <section class="card" style="grid-column: 1 / -1;">
            <h3>Test Command Selection</h3>
            <div style="display: flex; gap: 20px;">
                <div style="flex: 1; display: flex; flex-direction: column; gap: 10px;">
                    <select id="test-cmd-select" onchange="onTestCommandSelect()">
                        <option value="">Select a command to test...</option>
                    </select>
                    <div id="test-params-container" style="display: flex; flex-direction: column; gap: 10px;">
                        <!-- dynamic param inputs -->
                    </div>
                    <button onclick="testCommand()" style="background-color: var(--warning); color: #000; margin-top: 5px;">Run Test Request</button>
                </div>
                <div style="flex: 2; background: #000; border-radius: 8px; padding: 15px; font-family: monospace; font-size: 13px; max-height: 400px; overflow-y: auto;">
                    <pre id="test-output" style="margin: 0; padding: 0; background: transparent; white-space: pre-wrap; word-wrap: break-word;">Waiting for test execution...</pre>
                </div>
            </div>
        </section>
    </div>

    <div id="detail-view" onclick="this.style.display='none'">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>Request Detail</h2>
            <div id="modal-content"></div>
            <button onclick="document.getElementById('detail-view').style.display='none'">Close</button>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let allCommands = [];

        async function fetchRequests() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/requests`);
                const data = await res.json();
                renderQueue(data);
            } catch (err) { console.error(err); }
        }

        async function fetchCommands() {
            try {
                const res = await fetch(`${API_BASE}/api/admin/commands`);
                const data = await res.json();
                allCommands = data;
                renderCommands(data);
            } catch (err) { console.error(err); }
        }

        function renderQueue(requests) {
            const body = document.getElementById('queue-body');
            body.innerHTML = requests.map(req => `
                <tr class="request-item" onclick="showDetail('${req.uuid}')">
                    <td title="${req.uuid}">${req.uuid.slice(0, 8)}...</td>
                    <td>${req.command}</td>
                    <td>${new Date(req.created_at).toLocaleTimeString()}</td>
                    <td><span class="status-badge status-${req.status}">${req.status}</span></td>
                </tr>
            `).join('');
        }

        function renderCommands(commands) {
            const list = document.getElementById('cmd-list');
            list.innerHTML = '<h4>Existing Commands:</h4>' + commands.map(c => {
                let paramsStr = '';
                try {
                    const params = JSON.parse(c.parameters || '{}');
                    const keys = Object.keys(params);
                    if (keys.length > 0) {
                        paramsStr = `<br><span style="color:#64748b; font-size:11px;">Params: [${keys.join(', ')}]</span>`;
                    }
                } catch(e){}
                return `
                <div style="font-size: 13px; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px dotted var(--border);">
                    <code>${c.command}</code> <span style="color:var(--accent)">(${c.model})</span>
                    ${paramsStr}
                    <div style="margin-top: 4px; display:flex; gap: 8px;">
                        <button style="padding: 2px 6px; font-size: 10px; unset:all; background:var(--primary); cursor:pointer;" onclick="editCommand('${c.command}')">Edit</button>
                    </div>
                </div>
            `}).join('');

            // Update Test Dropdown
            const testSelect = document.getElementById('test-cmd-select');
            testSelect.innerHTML = '<option value="">Select a command to test...</option>' + 
                commands.map(c => `<option value="${c.command}">${c.command}</option>`).join('');
        }

        function addParamRow(key = '', description = '') {
            const container = document.getElementById('params-container');
            const div = document.createElement('div');
            div.className = 'param-row';
            div.innerHTML = `
                <input type="text" placeholder="paramKey (e.g. text)" value="${key}" class="param-key">
                <input type="text" placeholder="Description (optional)" value="${description}" class="param-desc">
                <button type="button" onclick="this.parentElement.remove()">X</button>
            `;
            container.appendChild(div);
        }

        async function editCommand(cmdName) {
            const res = await fetch(`${API_BASE}/api/admin/commands`);
            const commands = await res.json();
            const target = commands.find(c => c.command === cmdName);
            if (!target) return;

            document.getElementById('cmd-name').value = target.command;
            document.getElementById('cmd-model').value = target.model;
            document.getElementById('cmd-prompt').value = target.prompt_template;
            
            const container = document.getElementById('params-container');
            container.innerHTML = '';
            
            try {
                const params = JSON.parse(target.parameters || '{}');
                for (const [k, v] of Object.entries(params)) {
                    addParamRow(k, v);
                }
            } catch(e) {}
            
            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        async function saveCommand() {
            // Collect parameters from UI
            const paramRows = document.querySelectorAll('.param-row');
            const parameters = {};
            paramRows.forEach(row => {
                const key = row.querySelector('.param-key').value.trim();
                const desc = row.querySelector('.param-desc').value.trim();
                if (key) parameters[key] = desc;
            });

            const cmd = {
                command: document.getElementById('cmd-name').value.trim(),
                model: document.getElementById('cmd-model').value,
                prompt_template: document.getElementById('cmd-prompt').value.trim(),
                parameters: parameters
            };

            if (!cmd.command || !cmd.prompt_template) return alert('Fill all required fields');

            const res = await fetch(`${API_BASE}/api/admin/commands`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(cmd)
            });

            if (res.ok) {
                alert('Command saved!');
                fetchCommands();
                // Clear UI
                document.getElementById('cmd-name').value = '';
                document.getElementById('cmd-prompt').value = '';
                document.getElementById('params-container').innerHTML = '';
            }
        }

        async function showDetail(uuid) {
            const res = await fetch(`${API_BASE}/api/result/${uuid}`);
            const data = await res.json();
            
            const modal = document.getElementById('modal-content');
            modal.innerHTML = `
                <p><strong>UUID:</strong> ${uuid}</p>
                <p><strong>Status:</strong> ${data.status}</p>
                <p><strong>Result:</strong></p>
                <pre>${JSON.stringify(data.result || data.error, null, 2)}</pre>
            `;
            document.getElementById('detail-view').style.display = 'flex';
        }

        function onTestCommandSelect() {
            const selected = document.getElementById('test-cmd-select').value;
            const container = document.getElementById('test-params-container');
            container.innerHTML = '';
            if (!selected) return;

            const cmd = allCommands.find(c => c.command === selected);
            if (!cmd) return;

            try {
                const params = JSON.parse(cmd.parameters || '{}');
                for (const [k, v] of Object.entries(params)) {
                    container.innerHTML += `
                        <div style="display: flex; flex-direction: column;">
                            <label style="font-size: 12px; color: var(--text-muted); margin-bottom: 3px;">{{${k}}} ${v ? ' - ' + v : ''}</label>
                            <textarea class="test-param-val" data-key="${k}" rows="2" placeholder="Value for ${k}..."></textarea>
                        </div>
                    `;
                }
            } catch(e) {}
        }

        async function testCommand() {
            const selected = document.getElementById('test-cmd-select').value;
            if (!selected) return alert('Select a command first');

            const paramInputs = document.querySelectorAll('.test-param-val');
            const params = {};
            paramInputs.forEach(input => {
                params[input.dataset.key] = input.value;
            });

            const cmd = allCommands.find(c => c.command === selected);
            let previewPrompt = cmd.prompt_template;
            for (const [k, v] of Object.entries(params)) {
                previewPrompt = previewPrompt.replace(new RegExp(`{{${k}}}`, 'g'), v);
            }

            const output = document.getElementById('test-output');
            output.innerHTML = `<span style="color: var(--accent);">[Instantiated Prompt Preview]</span>\n${previewPrompt}\n\n`;
            output.innerHTML += `[Sending Request for '${selected}'...]\n`;

            try {
                const res = await fetch(`${API_BASE}/api/request`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ command: selected, params })
                });
                
                const data = await res.json();
                if (!res.ok) {
                    output.innerHTML += `<span style="color: var(--danger)">Error: ${data.error}</span>\n`;
                    return;
                }

                output.innerHTML += `UUID Received: ${data.requestUUID}\nPolling for result`;
                pollTestResult(data.requestUUID, output);
                fetchRequests(); // refresh queue UI
            } catch (err) {
                output.innerHTML += `<span style="color: var(--danger)">Network Error: ${err.message}</span>\n`;
            }
        }

        function pollTestResult(uuid, outputEl) {
            const interval = setInterval(async () => {
                try {
                    const res = await fetch(`${API_BASE}/api/result/${uuid}`);
                    const data = await res.json();
                    
                    if (data.status === 'completed' || data.status === 'failed') {
                        clearInterval(interval);
                        outputEl.innerHTML += `\n\n[Status]: <span style="color: ${data.status === 'completed' ? 'var(--success)' : 'var(--danger)'}">${data.status.toUpperCase()}</span>\n\n`;
                        outputEl.innerHTML += JSON.stringify(data.result || data.error, null, 2);
                        fetchRequests();
                    } else {
                        outputEl.innerHTML += `.`;
                    }
                } catch (e) {
                    clearInterval(interval);
                    outputEl.innerHTML += `\n<span style="color: var(--danger)">Poll Error: ${e.message}</span>`;
                }
            }, 3000);
        }

        // Initialize
        fetchRequests();
        fetchCommands();
        setInterval(fetchRequests, 5000);
    </script>
</body>
</html>
