<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bubo Bookmarks</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="app-layout">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="logo">🦉 Bubo</div>
                <button id="add-bookmark-btn" class="btn-primary">+ Add</button>
            </div>

            <nav class="sidebar-nav">
                <div class="nav-section">
                    <button class="nav-item active" data-collection="all">
                        <span class="icon">📁</span> All Bookmarks
                        <span class="count" id="count-all">0</span>
                    </button>
                    <button class="nav-item" data-collection="unsorted">
                        <span class="icon">📥</span> Unsorted
                        <span class="count" id="count-unsorted">0</span>
                    </button>
                </div>

                <div class="nav-section">
                    <div class="section-header">
                        <h3>Collections</h3>
                        <button id="new-collection-btn" class="btn-icon">+</button>
                    </div>
                    <div id="collections-list">
                        <!-- Collections will be loaded here -->
                    </div>
                    <button id="refresh-all-btn" class="btn-refresh-all">
                        🔄 Refresh Missing Meta
                    </button>
                </div>
            </nav>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <header class="top-bar">
                <div class="search-wrapper">
                    <span class="search-icon">🔍</span>
                    <input type="text" id="search-input" placeholder="Search title, description or URL...">
                </div>
                <div class="view-options">
                    <span id="current-collection-name">All Bookmarks</span>
                </div>
            </header>

            <div id="bookmarks-grid" class="bookmarks-grid">
                <!-- Bookmarks will be loaded here -->
                <div class="loader">Loading bookmarks...</div>
            </div>
        </main>
    </div>

    <!-- Modals -->
    <div id="modal-container" class="modal-container hidden">
        <div class="modal">
            <h2 id="modal-title">Add Bookmark</h2>
            <form id="bookmark-form">
                <div class="form-group">
                    <label for="bookmark-url">URL</label>
                    <input type="url" id="bookmark-url" required placeholder="https://...">
                </div>
                <div class="form-group">
                    <label for="bookmark-collection">Collection</label>
                    <select id="bookmark-collection">
                        <option value="">Unsorted</option>
                    </select>
                </div>
                <div class="modal-actions">
                    <button type="button" id="cancel-modal" class="btn-secondary">Cancel</button>
                    <button type="submit" class="btn-primary">Save</button>
                </div>
            </form>
        </div>
    </div>

    <script src="main.js"></script>
</body>

</html>
