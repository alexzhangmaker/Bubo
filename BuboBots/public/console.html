<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BuboBots Console</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=JetBrains+Mono:wght@400;500&family=Roboto+Condensed:ital,wght@0,300;0,400;0,700;1,300;1,400;1,700&display=swap" rel="stylesheet">
    <style>
        :root {
            --card-shadow: 0 1px 3px 0 rgb(0 0 0 / 0.1), 0 1px 2px -1px rgb(0 0 0 / 0.1);
            --primary: #0f172a;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text: #1e293b;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --success: #059669;
            --danger: #dc2626;
        }

        body {
            font-family: 'Roboto Condensed', 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1000px;
            margin: 0 auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border);
        }

        .card {
            background-color: var(--card-bg);
            border-radius: 12px;
            padding: 24px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1.5fr;
            gap: 20px;
        }

        .form-group {
            margin-bottom: 15px;
        }

        label {
            display: block;
            margin-bottom: 5px;
            font-size: 14px;
            color: var(--text-muted);
        }

        input, select, textarea {
            width: 100%;
            background-color: var(--bg);
            border: 1px solid var(--border);
            color: var(--text);
            padding: 10px;
            border-radius: 6px;
            box-sizing: border-box;
            font-family: 'Roboto Condensed', 'Inter', sans-serif;
        }

        button {
            background-color: var(--primary);
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 500;
        }

        button.danger { background-color: var(--danger); }

        table {
            width: 100%;
            border-collapse: collapse;
            margin-top: 20px;
        }

        th, td {
            text-align: left;
            padding: 12px;
            border-bottom: 1px solid var(--border);
            font-size: 14px;
        }

        .badge {
            padding: 2px 6px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
        }

        .badge-gchat { background: #4285f4; color: white; }
        .badge-tg { background: #0088cc; color: white; }

    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>BuboBots Manager</h1>
            <div id="status-indicator" style="color: var(--success)">● Online</div>
        </header>

        <div class="grid">
            <!-- Add Schedule -->
            <div class="card">
                <h3>Add New Schedule</h3>
                <div class="form-group">
                    <label>Provider</label>
                    <select id="p-provider">
                        <option value="google-chat">Google Chat</option>
                        <option value="telegram">Telegram</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Target ID (Space ID or Chat ID)</label>
                    <input type="text" id="p-target" placeholder="spaces/XXXX or -100XXXX">
                </div>
                <div class="form-group">
                    <label>Cron Expression</label>
                    <input type="text" id="p-cron" placeholder="0 9 * * * (At 9:00 AM)">
                </div>
                <div class="form-group">
                    <label>Message Type</label>
                    <div style="display: flex; gap: 15px; margin-top: 5px;">
                        <label style="display: inline-flex; align-items: center; cursor: pointer;">
                            <input type="radio" name="msgType" value="static" checked onchange="toggleFormMode()" style="width: auto; margin-right: 5px;"> Static Text
                        </label>
                        <label style="display: inline-flex; align-items: center; cursor: pointer;">
                            <input type="radio" name="msgType" value="function" onchange="toggleFormMode()" style="width: auto; margin-right: 5px;"> System Task
                        </label>
                    </div>
                </div>

                <div id="static-message-block">
                    <div class="form-group">
                        <label>Message Content</label>
                        <textarea id="p-message" rows="3" placeholder="Enter static text message..."></textarea>
                    </div>
                </div>

                <div id="system-task-block" style="display: none;">
                    <div class="form-group">
                        <label>Task Function</label>
                        <select id="p-task-select">
                            <option value="">Loading tasks...</option>
                        </select>
                    </div>
                    <div class="form-group">
                        <label>Arguments (JSON Array)</label>
                        <input type="text" id="p-task-args" placeholder='e.g. ["AAPL"]'>
                    </div>
                </div>

                <button onclick="addSchedule()">Save Schedule</button>
            </div>

            <!-- Send Immediate Message -->
            <div class="card">
                <h3>Send Immediate Message</h3>
                <div class="form-group">
                    <label>Provider</label>
                    <select id="i-provider">
                        <option value="google-chat">Google Chat</option>
                        <option value="telegram">Telegram</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>Target ID (Space ID or Chat ID)</label>
                    <input type="text" id="i-target" placeholder="spaces/XXXX or -100XXXX">
                </div>
                <div class="form-group">
                    <label>Message Content</label>
                    <textarea id="i-message" rows="4" placeholder="Enter message to send now..."></textarea>
                </div>
                <button onclick="sendImmediateMessage()" style="background-color: var(--success);">Send Message</button>
            </div>

            <!-- List Schedules -->
            <div class="card" style="grid-column: span 2">
                <h3>Active Schedules</h3>
                <table>
                    <thead>
                        <tr>
                            <th>Platform</th>
                            <th>Target</th>
                            <th>Schedule</th>
                            <th>Content</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="schedule-body">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>

            <!-- Ticker Management -->
            <div class="card" style="grid-column: span 2">
                <h3>Ticker Tracking (For yFinanceTask)</h3>
                <div style="display: flex; gap: 10px; margin-bottom: 15px;">
                    <input type="text" id="t-ticker" placeholder="Ticker (e.g. AAPL)" style="width: 150px;">
                    <input type="number" id="t-max" placeholder="Max Quote (Sell)" style="width: 150px;" step="0.01">
                    <input type="number" id="t-min" placeholder="Min Quote (Buy)" style="width: 150px;" step="0.01">
                    <button onclick="addTicker()">Add / Update Ticker</button>
                </div>
                <table>
                    <thead>
                        <tr>
                            <th>Ticker</th>
                            <th>Quote Max (Sell)</th>
                            <th>Quote Min (Buy)</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="ticker-body">
                        <!-- Rows -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        let availableTasks = [];

        async function init() {
            await fetchTasks();
            await fetchSchedules();
            await fetchTickers();
        }

        function toggleFormMode() {
            const isFunction = document.querySelector('input[name="msgType"]:checked').value === 'function';
            document.getElementById('static-message-block').style.display = isFunction ? 'none' : 'block';
            document.getElementById('system-task-block').style.display = isFunction ? 'block' : 'none';
        }

        async function fetchTasks() {
            try {
                const res = await fetch('/api/system-tasks');
                availableTasks = await res.json();
                const select = document.getElementById('p-task-select');
                if (availableTasks.length === 0) {
                    select.innerHTML = '<option value="">No tasks found</option>';
                    return;
                }
                select.innerHTML = availableTasks.map((t, idx) => 
                    `<option value="${idx}">${t.module} (via getTaskFunction)</option>`
                ).join('');
            } catch (e) {
                console.error('Failed to load tasks', e);
            }
        }

        async function fetchSchedules() {
            const res = await fetch('/api/schedules');
            const data = await res.json();
            const body = document.getElementById('schedule-body');
            body.innerHTML = data.map(s => {
                let contentDisplay = s.is_function 
                    ? `<span class="badge" style="background:var(--primary)">Task</span> ${s.fn_module} (${s.fn_args || ''})`
                    : `<span class="badge" style="background:var(--border)">Text</span>  ${s.message ? (s.message.length > 30 ? s.message.slice(0, 30) + '...' : s.message) : 'N/A'}`;

                
                return `
                <tr>
                    <td><span class="badge ${s.provider === 'telegram' ? 'badge-tg' : 'badge-gchat'}">${s.provider}</span></td>
                    <td><code>${s.target_id}</code></td>
                    <td><code>${s.cron_expression}</code></td>
                    <td title="${s.is_function ? 'Dynamic Task' : s.message}">${contentDisplay}</td>
                    <td>
                        <button class="danger" onclick="deleteSchedule(${s.id})">Delete</button>
                    </td>
                </tr>
                `;
            }).join('');
        }

        async function addSchedule() {
            const isFunction = document.querySelector('input[name="msgType"]:checked').value === 'function';
            
            let data = {
                provider: document.getElementById('p-provider').value,
                target_id: document.getElementById('p-target').value,
                cron_expression: document.getElementById('p-cron').value,
                is_function: isFunction ? 1 : 0
            };

            if (isFunction) {
                const taskIdx = document.getElementById('p-task-select').value;
                if (taskIdx === '') return alert('Please select a valid task');
                const task = availableTasks[taskIdx];
                data.fn_module = task.module;
                data.fn_name = task.name;
                data.fn_args = document.getElementById('p-task-args').value.trim();
                data.message = null; // No static message
                
                // Validate JSON args if provided
                if (data.fn_args) {
                    try {
                        JSON.parse(data.fn_args);
                    } catch(e) {
                        return alert('Arguments must be a valid JSON array! E.g. ["AAPL"]');
                    }
                } else {
                    data.fn_args = '[]'; // Default to empty array if nothing provided
                }
            } else {
                data.message = document.getElementById('p-message').value;
                data.fn_module = null;
                data.fn_name = null;
                data.fn_args = null;
            }

            const res = await fetch('/api/schedules', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                alert('Schedule added!');
                fetchSchedules();
            }
        }

        async function deleteSchedule(id) {
            if (!confirm('Are you sure?')) return;
            const res = await fetch(`/api/schedules/${id}`, { method: 'DELETE' });
            if (res.ok) fetchSchedules();
        }

        async function fetchTickers() {
            const res = await fetch('/api/tickers');
            const data = await res.json();
            const body = document.getElementById('ticker-body');
            body.innerHTML = data.map(t => `
                <tr>
                    <td><strong>${t.ticker}</strong></td>
                    <td><span style="color:var(--danger)">${t.quoteMax !== null ? '>=' + t.quoteMax : 'N/A'}</span></td>
                    <td><span style="color:var(--success)">${t.quoteMin !== null ? '<=' + t.quoteMin : 'N/A'}</span></td>
                    <td>
                        <button class="danger" onclick="deleteTicker(${t.id})">Delete</button>
                    </td>
                </tr>
            `).join('');
        }

        async function addTicker() {
            const ticker = document.getElementById('t-ticker').value.trim();
            const quoteMax = document.getElementById('t-max').value;
            const quoteMin = document.getElementById('t-min').value;

            if (!ticker) return alert('Ticker is required');

            const data = {
                ticker: ticker,
                quoteMax: quoteMax ? parseFloat(quoteMax) : null,
                quoteMin: quoteMin ? parseFloat(quoteMin) : null
            };

            const res = await fetch('/api/tickers', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(data)
            });

            if (res.ok) {
                document.getElementById('t-ticker').value = '';
                document.getElementById('t-max').value = '';
                document.getElementById('t-min').value = '';
                fetchTickers();
            }
        }

        async function deleteTicker(id) {
            if (!confirm('Are you sure you want to delete this ticker?')) return;
            const res = await fetch(`/api/tickers/${id}`, { method: 'DELETE' });
            if (res.ok) fetchTickers();
        }

        async function sendImmediateMessage() {
            const channel = document.getElementById('i-provider').value;
            const targetID = document.getElementById('i-target').value.trim();
            const message = document.getElementById('i-message').value.trim();

            if (!targetID || !message) {
                return alert('Target ID and Message are required.');
            }

            const res = await fetch('/api/sendMessage', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ channel, targetID, message })
            });

            if (res.ok) {
                alert('Message sent successfully!');
                document.getElementById('i-message').value = '';
            } else {
                const err = await res.json();
                alert('Failed to send message: ' + (err.error || 'Unknown error'));
            }
        }

        init();
    </script>
</body>
</html>
